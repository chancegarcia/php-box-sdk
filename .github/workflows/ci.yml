name: CI

on:
  push:
    branches: [ "main", "develop", "release-*", "feature-*", "patch-*", "*-rc" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  tests:
    name: "${{ matrix.os }} / PHP ${{ matrix.php-version }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(github.event_name == 'pull_request' && '[{"os":"ubuntu-latest","php-version":"8.4"},{"os":"ubuntu-latest","php-version":"8.5"},{"os":"macos-15","php-version":"8.4"},{"os":"macos-15","php-version":"8.5"}]' || '[{"os":"ubuntu-latest","php-version":"8.4"},{"os":"ubuntu-latest","php-version":"8.5"}]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: ${{ matrix.php-version }}
          extensions: fileinfo, openssl, pdo
          coverage: none
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Composer Audit
        run: composer audit

      - name: Lint PHP
        run: composer lint

      - name: PHP_CodeSniffer
        run: composer cs:check

      - name: PHPStan
        run: composer analyse

      - name: PHPUnit
        run: composer test
